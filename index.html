<!DOCTYPE html>
<html lang="en" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MTC TIERS</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/mtctiers/mtctiers.github.io@main/css.css">
    <link rel="icon" type="image/png" href="https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/backgroundsword.png">
</head>
<body>
<div class="sweep-bg"></div>

<header style="text-align:center; margin-top:20px;">
    <img src="https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/backgroundsword.png" style="width:50px;">
    <h1 style="font-size:2.2rem; color:#fff; text-shadow: 0 0 15px var(--purple);">MTC TIERS</h1>
</header>

<nav>
    <div id="nav-rankings" class="nav-link active" onclick="switchTab('rankings')">RANKINGS</div>
    <div id="nav-hof" class="nav-link" onclick="switchTab('hof')">HALL OF FAME</div>
    <div id="nav-testers" class="nav-link" onclick="switchTab('testers')">TIER TESTERS</div>
</nav>

<div id="viewLabel" style="text-align:center; color:var(--gold); margin:20px 0; font-size:1.2rem;">OVERALL</div>
<div id="kitBar" style="display:flex; justify-content:center; flex-wrap:wrap; margin-bottom:30px;"></div>
<div id="displayList"></div>

<div id="profileModal" class="modal-overlay" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="pRank" style="color:var(--purple); font-size:0.75rem;">RANK #--</div>
        <h2 id="pName" style="color:#fff; margin:10px 0; font-size: 2rem;">Player</h2>
        <div id="pMeta"></div>
        <div id="pPoints" style="color:var(--gold); font-size:1.5rem; margin-bottom:20px;">0 PTS</div>
        <div id="pTiers" style="display:flex; flex-wrap:wrap; justify-content:center; gap:15px; border-top:1px solid #222; padding-top:20px;"></div>
    </div>
</div>

<script>
const ASSETS = "https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/assets/";
const DATA_PATH = "https://raw.githubusercontent.com/mtctiers/mtctiers.github.io/refs/heads/main/data/";
const KIT_MAP = { "Overall": "", "Emerald": "emerald.png", "Emerald KB": "emerald_kb.png", "Emerald OA": "emerald_oa.png", "Dragonhide KB": "dragonhide_kb.png", "Dragonhide KB OA": "kb_oa.png", "Wand": "wand.png", "Diamond": "diamond.png" };

let DATA = {};

async function load() {
    const r = await fetch(`${DATA_PATH}rankings.json?v=${Date.now()}`);
    DATA = await r.json();
    calculateOverall();
    buildKitBar();
    render("Overall");
}

function calculateOverall() {
    let totals = {};
    const PTS = { "HT1":50, "LT1":40, "HT2":30, "LT2":20, "HT3":12, "LT3":8, "HT4":5, "LT4":3, "HT5":2, "LT5":1 };
    for(let k in DATA) if(k!=="Players") for(let t in DATA[k]) DATA[k][t].forEach(p => totals[p] = (totals[p]||0) + (PTS[t.replace('R','')]||0));
    DATA["Overall"] = totals;
}

function buildKitBar() {
    const bar = document.getElementById('kitBar');
    Object.keys(KIT_MAP).forEach(k => {
        const btn = document.createElement('button');
        btn.className = `kit-btn ${k==='Overall'?'active':''}`;
        btn.innerHTML = (KIT_MAP[k] ? `<img src="${ASSETS}${KIT_MAP[k]}" style="width:16px; margin-right:5px;"> ` : "") + k.toUpperCase();
        btn.onclick = () => {
            document.querySelectorAll('.kit-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render(k);
        };
        bar.appendChild(btn);
    });
}

function render(kit) {
    const out = document.getElementById('displayList');
    out.innerHTML = "";
    document.getElementById('viewLabel').innerText = kit.toUpperCase();
    
    if(kit === "Overall") {
        Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]).forEach(([name, pts], i) => {
            out.innerHTML += `<div class="tier-card clickable" onclick="openProfile('${name}')">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <span><b style="color:var(--purple)">#${i+1}</b> ${name}</span>
                    <b style="color:var(--gold)">${pts} PTS</b>
                </div>
            </div>`;
        });
    } else {
        const grid = document.createElement('div'); grid.style.display="flex"; grid.style.gap="15px"; grid.style.flexWrap="wrap"; grid.style.justifyContent="center";
        ["T1","T2","T3","T4","T5"].forEach(lvl => {
            let col = `<div style="min-width:200px;"><div style="color:var(--purple); text-align:center; border-bottom:1px solid #222; padding-bottom:10px; margin-bottom:15px;">${lvl}</div>`;
            let has = false;
            for(let t in DATA[kit]) if(t.includes(lvl)) DATA[kit][t].forEach(name => {
                has = true;
                col += `<div class="tier-card clickable" onclick="openProfile('${name}')" style="margin-bottom:10px; text-align:center;">
                    <div>${name}</div>
                    <div style="font-size:0.6rem; color:var(--gold);">${t}</div>
                </div>`;
            });
            if(has) { col += `</div>`; grid.innerHTML += col; }
        });
        out.appendChild(grid);
    }
}

function openProfile(name) {
    const sorted = Object.entries(DATA.Overall).sort((a,b)=>b[1]-a[1]);
    document.getElementById('pRank').innerText = "RANK #" + (sorted.findIndex(x => x[0] === name) + 1);
    document.getElementById('pName').innerText = name;
    document.getElementById('pPoints').innerText = DATA.Overall[name] + " PTS";
    
    let grid = "";
    for(let k in DATA) if(k!=="Overall" && k!=="Players") for(let t in DATA[k]) if(DATA[k][t].includes(name)) {
        grid += `<div class="p-kit-item">
            <div class="p-kit-circle">${KIT_MAP[k]?`<img src="${ASSETS}${KIT_MAP[k]}">`:''}</div>
            <div style="font-size:0.6rem; color:var(--gold);">${t}</div>
        </div>`;
    }
    document.getElementById('pTiers').innerHTML = grid;
    document.getElementById('profileModal').style.display = 'flex';
}

function switchTab(tab) {
    document.querySelectorAll('.nav-link').forEach(n => n.classList.remove('active'));
    document.getElementById('nav-' + tab).classList.add('active');
    if(tab === 'rankings') render("Overall");
}

load();
</script>
</body>
</html>
